name: SmartGrid H1 CI-CD Experiment

run-name: H1 CI/CD - ${{ github.event_name }} - ${{ github.run_id }}

on:
  push:
    branches:
      - h1-cicd-official

permissions:
  contents: read

concurrency:
  group: h1-cicd-experiment
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Prepare experiment context
        shell: bash
        run: |
          COMMIT_SUBJECT="$(git log -1 --pretty=%s)"

          if [[ "$COMMIT_SUBJECT" =~ ^H1-CICD-RUN-0[1-3]$ ]]; then
            if git diff-tree               --no-commit-id               --name-only               -r HEAD |
              grep -q .
            then
              echo "Le commit déclenchant une mesure officielle doit être vide."
              exit 1
            fi

            RUN_ID="$COMMIT_SUBJECT"
            OFFICIAL_MEASUREMENT="YES"
          else
            RUN_ID="H1-CICD-DIAG-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
            OFFICIAL_MEASUREMENT="NO"
          fi

          IMAGE_TAG="h1-cicd-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          echo "RUN_ID=$RUN_ID" >> "$GITHUB_ENV"
          echo "OFFICIAL_MEASUREMENT=$OFFICIAL_MEASUREMENT" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Verify runner environment
        shell: bash
        run: |
          docker version
          kubectl get nodes
          kubectl get namespaces
          sudo -n /usr/local/bin/k3s ctr images list >/dev/null

      - name: Execute measured deployment
        shell: bash
        run: |
          chmod +x scripts/h1-cicd-measure.sh

          set +e

          env \
            RUN_ID="$RUN_ID" \
            OFFICIAL_MEASUREMENT="$OFFICIAL_MEASUREMENT" \
            IMAGE_TAG="$IMAGE_TAG" \
            NAMESPACE="smartgrid-dev" \
            REFERENCE_SECONDS="180" \
            ROLLOUT_TIMEOUT_SECONDS="180" \
            HEALTH_TIMEOUT_SECONDS="30" \
            ./scripts/h1-cicd-measure.sh \
            2>&1 | tee workflow-execution.log

          SCRIPT_RC=${PIPESTATUS[0]}

          echo "SCRIPT_RC=$SCRIPT_RC" >> "$GITHUB_ENV"

          exit "$SCRIPT_RC"

      - name: Enforce final rest state
        if: always()
        shell: bash
        run: |
          for service in \
            api-gateway \
            iot-simulator \
            data-collector \
            processing-service \
            optimization-service
          do
            kubectl scale \
              "deployment/$service" \
              -n smartgrid-dev \
              --replicas=0 || true
          done

      - name: Show experimental result
        if: always()
        shell: bash
        run: |
          echo "RUN_ID=$RUN_ID"
          echo "SCRIPT_RC=${SCRIPT_RC:-UNKNOWN}"

          find reports \
            -type f \
            -path "*${RUN_ID}*" \
            -maxdepth 6 \
            -print 2>/dev/null || true

          find reports \
            -type f \
            -path "*${RUN_ID}*/result.json" \
            -exec cat {} \; 2>/dev/null || true

      - name: Upload experimental evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: h1-cicd-${{ env.RUN_ID }}
          path: |
            reports/experiments/deployment/${{ env.RUN_ID }}
            reports/diagnostics/${{ env.RUN_ID }}-cicd-dry-run
            workflow-execution.log
          if-no-files-found: warn
          retention-days: 30
