apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-simulator
  namespace: smartgrid-dev
spec:
  replicas: 0
  selector:
    matchLabels:
      app: iot-simulator
  template:
    metadata:
      labels:
        app: iot-simulator
    spec:
      containers:
        - name: iot-simulator
          image: iot-simulator:structured-logs-v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: iot-simulator
  namespace: smartgrid-dev
spec:
  type: NodePort
  selector:
    app: iot-simulator
  ports:
    - port: 3001
      targetPort: 3001
      nodePort: 30081
---
