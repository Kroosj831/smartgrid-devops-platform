apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard-api-sa
  namespace: smartgrid-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dashboard-api-role
  namespace: smartgrid-dev
rules:
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - autoscaling
    resources:
      - horizontalpodautoscalers
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dashboard-api-rolebinding
  namespace: smartgrid-dev
subjects:
  - kind: ServiceAccount
    name: dashboard-api-sa
    namespace: smartgrid-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dashboard-api-role
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-api
  namespace: smartgrid-dev
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dashboard-api
  template:
    metadata:
      labels:
        app: dashboard-api
    spec:
      serviceAccountName: dashboard-api-sa
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dashboard-api
          image: dashboard-api:live-demo-v2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          env:
            - name: PORT
              value: "4000"
            - name: SMARTGRID_NAMESPACE
              value: "smartgrid-dev"
            - name: REPORTS_DIR
              value: "/reports"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: dashboard-reports
              mountPath: /reports
              readOnly: true
          startupProbe:
            httpGet:
              path: /dashboard/health
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /dashboard/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /dashboard/health
              port: http
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: dashboard-reports
          hostPath:
            path: /home/serveur_devops/smartgrid-devops-platform/reports
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-api
  namespace: smartgrid-dev
spec:
  type: NodePort
  selector:
    app: dashboard-api
  ports:
    - name: http
      port: 4000
      targetPort: http
      nodePort: 30574
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-frontend
  namespace: smartgrid-dev
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: dashboard-frontend
  template:
    metadata:
      labels:
        app: dashboard-frontend
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: dashboard-frontend
          image: dashboard-frontend:scientific-v1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: nginx-tmp
              mountPath: /tmp
          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: nginx-tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-frontend
  namespace: smartgrid-dev
spec:
  type: NodePort
  selector:
    app: dashboard-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30573
      protocol: TCP
