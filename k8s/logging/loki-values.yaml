deploymentMode: Monolithic

loki:
  auth_enabled: false

  analytics:
    reporting_enabled: false

  commonConfig:
    path_prefix: /var/loki
    replication_factor: 1

  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: filesystem
    filesystem:
      chunks_directory: /var/loki/chunks
      rules_directory: /var/loki/rules

  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
    reject_old_samples: true
    reject_old_samples_max_age: 168h
    retention_period: 168h
    query_timeout: 120s
    split_queries_by_interval: 15m

  compactor:
    retention_enabled: true
    delete_request_store: filesystem

singleBinary:
  replicas: 1

  persistence:
    enabled: true
    storageClass: local-path
    accessModes:
      - ReadWriteOnce
    size: 5Gi
    whenDeleted: Retain
    whenScaled: Retain

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi

# Désactivation de tous les autres modes Loki.
backend:
  replicas: 0

read:
  replicas: 0

write:
  replicas: 0

ingester:
  replicas: 0

querier:
  replicas: 0

queryFrontend:
  replicas: 0

queryScheduler:
  replicas: 0

distributor:
  replicas: 0

compactor:
  replicas: 0

indexGateway:
  replicas: 0

bloomPlanner:
  replicas: 0

bloomBuilder:
  replicas: 0

bloomGateway:
  replicas: 0

# Composants annexes inutiles dans le laboratoire.
gateway:
  enabled: false

lokiCanary:
  enabled: false

chunksCache:
  enabled: false

resultsCache:
  enabled: false

minio:
  enabled: false

# Le test Helm dépend du Loki Canary.
# Les deux sont désactivés dans le laboratoire.
test:
  enabled: false

# Aucun cache Memcached n'est nécessaire dans le laboratoire.
memcached:
  enabled: false
